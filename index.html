    `,narrative:'GLITCH no es simplemente una fiesta o una productora de eventos tradicional; es una interferencia intencional en la rutina digital. La idea central es romper con la "anestesia" que nos produce el consumo infinito de redes sociales, el scroll constante y las identidades fabricadas. GLITCH propone un corte radical en esa señal para volver a conectar con el mundo físico, la materia y el sudor.'},{id:2,category:"SECTOR 02 // PROPÓSITO",title:"PROPÓSITO CENTRAL",subtitle:"Estimulación cognitiva contra el conformismo",asciiArt:`

        ||               * /  \\ *              ||
        ||              * < [] > *             ||

        ||          RECONEXION SENSORIAL       ||
         \\=====================================/
    `,narrative:"El objetivo es escapar del conformismo. Se busca utilizar la tecnología a nuestro favor para estimular la percepción cognitiva, en lugar de dejar que nos adormezca. Es una apuesta por la disciplina artística pura donde la máquina y el humano trabajan juntos."},{id:3,category:"SECTOR 03 // EL RECORRIDO",title:"EL PORTAL // THE INTERFERENCE TUNNEL",subtitle:"Puente de Desconexión Absoluta",asciiArt:`
            [=============================]

            [=============================]
    `,narrative:`El evento está diseñado físicamente como un portal de inmersión dividido en tres zonas clave:

El Portal (The Interference Tunnel) es la entrada. Funciona como un túnel de "desconexión absoluta" con una estética tipo hacker o Matrix. Aquí, el ambiente está saturado de luces neón y música ambient industrial para reiniciar los sentidos antes de entrar a la fiesta.`},{id:4,category:"SECTOR 04 // EL NÚCLEO",title:"EL NÚCLEO // THE MAIN CORE",subtitle:"Pista de baile e instalación reactiva masiva",asciiArt:`
               |\\/|\\/|\\/|\\/|\\/|\\/|\\/|

    `,narrative:"Es el corazón del evento. Una pista de baile que funciona como una instalación interactiva masiva. Aquí se escucha hardtechno y hardgroove. Lo especial es que las luces y los láseres no son fijos; reaccionan en tiempo real al sonido y al movimiento de las personas."},{id:5,category:"SECTOR 05 // COLABORATIVO",title:"EL ESPACIO COLABORATIVO // THE ERROR ROOM",subtitle:"Zona de descanso etérea y experimentación libre",asciiArt:`
             .---------------------------------.

       / _ _ _ _ _  ================= _ _ /    |
       |                                 |     |

       |_________________________________|___/
    `,narrative:'Es una zona de descanso etérea ("chill out"). A diferencia de la pista principal, es un lienzo en blanco donde se invita a otros artistas a traer sus propias ideas, proyecciones, pantallas antiguas de tubo (CRT) con estática o sintetizadores experimentales en vivo para crear texturas sonoras ambientales alternativas.'},{id:6,category:"SECTOR 06 // REGLAS DE ORO",title:"LOS PILARES DE GLITCH",subtitle:"Tres pilares arquitectónicos inalienables",asciiArt:`
          |         |         |         |
          |  [ R ]  |  [ H ]  |  [ I ]  |
          |  REACT- |  HARD-  |  INMER- |
          |  IVIDAD |  WARE   |  SION   |
          |         |  PURO   |         |
          |_________|_________|_________|
    `,narrative:`Todo el evento se sostiene sobre tres reglas de oro técnicas:

• Reactividad: Todo está conectado. Las luces y máquinas mutan basándose en los estímulos del momento.

• Hardware Puro: La tecnología no se esconde. Los cables, los circuitos y los equipos son visibles y forman parte de la decoración.

• Inmersión: El lugar está construido arquitectónicamente para alterar la percepción de quienes entran.`},{id:7,category:"SECTOR 07 // LA COMUNIDAD",title:"CÓMO FUNCIONA LA COMUNIDAD",subtitle:"Colaboración horizontal y directrices ineludibles",asciiArt:`
                 O --------- O --------- O
                / \\         / \\         / \\
               /   \\       /   \\       /   \\
              O --- O --- O --- O --- O --- O
              |  SISTEMA COOPERATIVO ACTIVO |
              O ----------- O ----------- O
    `,narrative:`GLITCH es un manifiesto vivo operado en comunidad. No existen jerarquías tradicionales ni estructuras de jefe-empleado. Es un sistema horizontal donde los artistas se unen por la urgencia de crear algo secreto, mutuo y resistente.

Las directrices para los artistas que participan son claras:

• Reactividad absoluta: El arte debe responder al sonido en tiempo real.

• Estética del error: Se busca deliberadamente el glitch art, el ruido digital y las distorsiones analógicas.

• Hardware expuesto: Se prioriza mostrar las máquinas y sintetizadores modulares en lugar de usar computadoras ocultas.`},{id:8,category:"SECTOR 08 // CONVOCATORIA",title:"CONVOCATORIA ABIERTA // UNIÓN MULTIDISCIPLINAR",subtitle:"Llamado a músicos, pintores, bailarines, VJs, DJs y productores",asciiArt:`

          /                                         \\

         |                                          |
         |   * CLAVE RESISTENCIA: REQUERIDA         |
         |   * ACCESO: 2 INVITADOS DE CORTESÍA      |
         |   * STATUS: ENCRIPTADO [***-***-***]     |
          \\_________________________________________/
    `,narrative:`Queremos dar las gracias profundamente a toda la comunidad involucrada. GLITCH no es nada sin las mentes inquietas que lo transforman en realidad. Convocamos formalmente a músicos experimentales, pintores, bailarines escénicos, VJs de distorsión visual, DJs, productores de frecuencias de vanguardia y creadores de todas las disciplinas a sumarse a esta resistencia analógica.

Como muestra de nuestro sincero agradecimiento por su labor de co-creación, cada artista invitado tendrá asignado un código único que otorga 2 ENTRADAS GRATIS. Por seguridad y para preservar el misterio, estos pases se encuentran actualmente encriptados y deberán ser decodificados el día del evento introduciendo la KEY PASSWORD correspondiente en esta terminal.`}];/**
